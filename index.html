<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Relax & Schule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f6f9;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background-color: #4a6fa5;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #3a5a85;
        }

        input {
            padding: 10px;
            width: 90%;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        #activity {
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
            color: #4a6fa5;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 8px 0;
        }
    </style>
</head>
<body>

<h1>🌿 Relax & 📚 Schule</h1>

<div class="container">

    <!-- ENTSPANNUNG -->
    <div class="box">
        <h2>Entspannungs-Aktivitäten</h2>

        <div id="activity">Klick auf den Button ✨</div>

        <button onclick="showRandomActivity()">Zufällige Aktivität</button>

        <input type="text" id="newActivity" placeholder="Neue Aktivität hinzufügen">
        <button onclick="addActivity()">Hinzufügen</button>
    </div>

    <!-- SCHULE -->
    <div class="box">
        <h2>Schulkram ✅</h2>

        <input type="text" id="newTodo" placeholder="Hausaufgabe / To-Do">
        <button onclick="addTodo()">Hinzufügen</button>

        <ul id="todoList"></ul>
    </div>

</div>

<script>
    // ENTSPANNUNG
    let activities = [
        "Zeichnen",
        "Einen Charakter erstellen",
        "Eine Szene malen",
        "Workout machen",
        "Einen Smoothie zubereiten",
        "Musik hören",
        "Spazieren gehen",
        "Meditieren"
    ];

    function showRandomActivity() {
        let randomIndex = Math.floor(Math.random() * activities.length);
        document.getElementById("activity").innerText = activities[randomIndex];
    }

    function addActivity() {
        let input = document.getElementById("newActivity");
        let value = input.value.trim();

        if (value !== "") {
            activities.push(value);
            input.value = "";
            alert("Aktivität hinzugefügt 🌸");
        }
    }

    // SCHULE / CHECKLISTE
    function addTodo() {
        let input = document.getElementById("newTodo");
        let value = input.value.trim();

        if (value !== "") {
            let li = document.createElement("li");

            let checkbox = document.createElement("input");
            checkbox.type = "checkbox";

            checkbox.onchange = function() {
                li.remove(); // Aufgabe verschwindet
            };

            li.appendChild(checkbox);
            li.append(" " + value);

            document.getElementById("todoList").appendChild(li);
            input.value = "";
        }
    }
</script>

</body>
</html>
