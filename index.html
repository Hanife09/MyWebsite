<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Relax & Schule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f6f9;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            padding: 8px;
            width: 90%;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 8px;
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background-color: #4a6fa5;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
    </style>
</head>
<body>

<h1>🌿 Relax & 📚 Schule</h1>

<div class="container">

    <!-- ENTSPANNUNG -->
    <div class="box">
        <h2>Entspannungs-Aktivitäten</h2>

        <div id="activity">Klick auf den Button ✨</div>
        <button onclick="showRandomActivity()">Zufällige Aktivität</button>

        <input type="text" id="newActivity" placeholder="Neue Aktivität">
        <button onclick="addActivity()">Hinzufügen</button>

        <ul id="activityList"></ul>
    </div>

    <!-- SCHULE -->
    <div class="box">
        <h2>Schulkram ✅</h2>

        <input type="text" id="newTodo" placeholder="Hausaufgabe / To-Do">
        <button onclick="addTodo()">Hinzufügen</button>

        <ul id="todoList"></ul>
    </div>

</div>

<script>
    // ---------- ENTSPANNUNG ----------
    let activities = JSON.parse(localStorage.getItem("activities")) || [
        "Zeichnen",
        "Einen Charakter erstellen",
        "Workout",
        "Smoothie machen"
    ];

    function saveActivities() {
        localStorage.setItem("activities", JSON.stringify(activities));
    }

    function showRandomActivity() {
        let i = Math.floor(Math.random() * activities.length);
        document.getElementById("activity").innerText = activities[i];
    }

    function renderActivities() {
        let list = document.getElementById("activityList");
        list.innerHTML = "";

        activities.forEach((a, index) => {
            let li = document.createElement("li");
            li.textContent = a;

            let del = document.createElement("button");
            del.textContent = "✖";
            del.onclick = () => {
                activities.splice(index, 1);
                saveActivities();
                renderActivities();
            };

            li.appendChild(del);
            list.appendChild(li);
        });
    }

    function addActivity() {
        let input = document.getElementById("newActivity");
        if (input.value.trim() !== "") {
            activities.push(input.value.trim());
            saveActivities();
            renderActivities();
            input.value = "";
        }
    }

    // ---------- SCHULE ----------
    let todos = JSON.parse(localStorage.getItem("todos")) || [];

    function saveTodos() {
        localStorage.setItem("todos", JSON.stringify(todos));
    }

    function renderTodos() {
        let list = document.getElementById("todoList");
        list.innerHTML = "";

        todos.forEach((todo, index) => {
            let li = document.createElement("li");

            let checkbox = document.createElement("input");
            checkbox.type = "checkbox";

            checkbox.onchange = () => {
                todos.splice(index, 1);
                saveTodos();
                renderTodos();
            };

            let text = document.createElement("span");
            text.textContent = todo;

            li.appendChild(checkbox); // ✔️ GANZ AM ANFANG
            li.appendChild(text);

            list.appendChild(li);
        });
    }

    function addTodo() {
        let input = document.getElementById("newTodo");
        if (input.value.trim() !== "") {
            todos.push(input.value.trim());
            saveTodos();
            renderTodos();
            input.value = "";
        }
    }

    // ---------- START ----------
    renderActivities();
    renderTodos();
</script>

</body>
</html>
